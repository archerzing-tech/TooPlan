name: Build and Release Android APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --install 'platforms;android-34' 'build-tools;34.0.0' 'ndk;26.1.10909125' 'cmake;3.22.1'

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      # Official Tauri v2 Android signing setup (https://v2.tauri.app/distribute/sign/android/)
      # ⚠️ ANDROID_KEY_BASE64 must be set as a GitHub secret!
      # To generate: keytool -genkey ... && base64 keystore.jks
      - name: Setup Android signing
        run: |
          cd src-tauri/gen/android
          if [ -z "${{ secrets.ANDROID_KEY_BASE64 }}" ]; then
            echo "ERROR: ANDROID_KEY_BASE64 secret is not set!"
            echo ""
            echo "Each release MUST be signed with the SAME keystore to allow app updates."
            echo "See the project README or scripts/generate-keystore.sh for setup."
            exit 1
          fi
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" > keystore.properties
          echo "password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> keystore.properties
          base64 -d <<< "${{ secrets.ANDROID_KEY_BASE64 }}" > $RUNNER_TEMP/keystore.jks
          echo "storeFile=$RUNNER_TEMP/keystore.jks" >> keystore.properties

      - name: Build Android APK
        run: npx tauri android build --target aarch64 --apk

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          APK_DIR="src-tauri/gen/android/app/build/outputs/apk"
          # Find the built APK - with --target aarch64 it's in arm64-v8a/release/
          # Fall back to any APK not in debug/
          APK_FILE=$(find "$APK_DIR" -name '*.apk' -path '*/arm64-v8a/release/*' | head -1)
          if [ -z "$APK_FILE" ]; then
            APK_FILE=$(find "$APK_DIR" -name '*.apk' -not -path '*/debug/*' | head -1)
          fi
          if [ -z "$APK_FILE" ]; then
            echo "ERROR: No APK found in $APK_DIR"
            exit 1
          fi
          echo "Found APK: $APK_FILE"
          mv "$APK_FILE" "$APK_DIR/TooPlan-v${VERSION}.apk"

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## TooPlan v${{ steps.get_version.outputs.VERSION }}

            Automated build release for TooPlan - Todo List Android App.

            ### APK Download
            - [TooPlan-v${{ steps.get_version.outputs.VERSION }}.apk](TooPlan-v${{ steps.get_version.outputs.VERSION }}.apk)
          files: src-tauri/gen/android/app/build/outputs/apk/TooPlan-v${{ steps.get_version.outputs.VERSION }}.apk
          draft: false
          prerelease: false
